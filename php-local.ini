[PHP]

;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;
; ShoeHub — Local PHP Environment Configuration ;
;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;;

; Set the absolute path to your PHP extensions folder
extension_dir = "C:\Program Files\php8.5.0\ext"

; Critical extensions for Laravel
extension=curl
extension=fileinfo
extension=gd
extension=mbstring
extension=openssl
extension=pdo_mysql

; Performance and error settings
memory_limit = 512M
upload_max_filesize = 100M
post_max_size = 100M
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
default_charset = "UTF-8"

[Date]
date.timezone = "UTC"
